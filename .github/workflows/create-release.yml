name: Create Release and Update Documentation
on:
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty to use plugin.xml version)'
        required: false
        type: string

jobs:
  create-release:
    # Only run if PR was merged (not just closed) and title contains "Update native agents"
    # OR if manually triggered
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.title, 'Update native agents'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      release_notes: ${{ steps.parse_changelog.outputs.release_notes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Get version from plugin.xml
        id: get_version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using provided version: $VERSION"
          else
            VERSION=$(grep 'id="newrelic-cordova-plugin"' plugin.xml | sed 's/.*version="\([^"]*\)".*/\1/')
            echo "Extracted version from plugin.xml: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Parse CHANGELOG.md for latest release
        id: parse_changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Extract the section for this version from CHANGELOG.md
          # Read from the version header until the next version header or end of file
          RELEASE_NOTES=$(awk "/^# ${VERSION}/,/^# [0-9]/" CHANGELOG.md | sed '1d;$d' | sed '/^$/d')

          # If empty, try to get the first entry
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES=$(awk '/^# [0-9]/,/^# [0-9]/' CHANGELOG.md | head -n -1 | sed '1d')
          fi

          echo "Release notes:"
          echo "$RELEASE_NOTES"

          # Save to output using heredoc for multiline
          {
            echo 'release_notes<<EOF'
            echo "$RELEASE_NOTES"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Get Android and iOS versions
        id: agent_versions
        run: |
          ANDROID_VERSION=$(grep 'preference name="ANDROID_AGENT_VER"' plugin.xml | sed 's/.*default="\(.*\)".*/\1/')
          IOS_VERSION=$(grep 'pod name="NewRelicAgent"' plugin.xml | sed 's/.*spec="~>\(.*\)".*/\1/')

          echo "android_version=$ANDROID_VERSION" >> $GITHUB_OUTPUT
          echo "ios_version=$IOS_VERSION" >> $GITHUB_OUTPUT

          echo "Android Agent Version: $ANDROID_VERSION"
          echo "iOS Agent Version: $IOS_VERSION"

      - name: Create Git Tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping tag creation"
          else
            # Create annotated tag
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
            echo "Created and pushed tag v${VERSION}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            # New Relic Cordova Agent v${{ steps.get_version.outputs.version }}

            ${{ steps.parse_changelog.outputs.release_notes }}

            ## Agent Versions
            - Android Agent: ${{ steps.agent_versions.outputs.android_version }}
            - iOS Agent: ${{ steps.agent_versions.outputs.ios_version }}

            ## Installation
            ```bash
            cordova plugin add newrelic-cordova-plugin@${{ steps.get_version.outputs.version }}
            ```
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Summary
        run: |
          echo "## Release Created Successfully! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Android Agent:** ${{ steps.agent_versions.outputs.android_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**iOS Agent:** ${{ steps.agent_versions.outputs.ios_version }}" >> $GITHUB_STEP_SUMMARY

  update-documentation:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # --- CONFIG: Update these per repository ---
      AGENT_NAME: "cordova"
      AGENT_TITLE: "Cordova agent"
      DOCS_PATH: "src/content/docs/release-notes/mobile-release-notes/cordova-release-notes"
      REPO_URL: "https://github.com/newrelic/newrelic-cordova-plugin"
      # Define your specific download source here
      DOWNLOAD_LINK: "https://github.com/newrelic/newrelic-cordova-plugin"
      # --- SECRETS ---
      BOT_PAT: ${{ secrets.BOT_PAT }}
      BOT_EMAIL: ${{ secrets.BOT_EMAIL }} 

    steps:
      - name: Checkout Agent Repo
        uses: actions/checkout@v4
        with:
          path: agent-repo

      - name: Checkout Docs-Website
        uses: actions/checkout@v4
        with:
          repository: newrelic/docs-website
          ref: develop
          token: ${{ secrets.BOT_PAT }}
          path: docs-website
          fetch-depth: 0

      - name: Generate Release Document
        working-directory: agent-repo
        env:
          PASSED_VERSION: ${{ needs.create-release.outputs.version }}
          GH_TOKEN: ${{ secrets.BOT_PAT }} # Required for 'gh' commands inside the script
        run: |
          chmod +x ./.github/scripts/generate-docs.sh
          ./.github/scripts/generate-docs.sh
          
          if [ -f "release_info.env" ]; then
            cat release_info.env >> $GITHUB_ENV
          else
            echo "::error::Agent script failed to create release_info.env at ./.github/scripts/"
            exit 1
          fi

      - name: Create branch, commit, and PR
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          cd docs-website
          
          # 1. Setup Version Variables
          VERSION="${{ env.FINAL_VERSION }}"
          
          # Strip dots for the filename: 2.2.3 -> 223
          VERSION_STRIPPED=$(echo "${VERSION}" | tr -d '.')
          
          # Define the final filename using the stripped version
          FINAL_FILENAME="${{ env.AGENT_NAME }}-agent-${VERSION_STRIPPED}.mdx"
          
          # 2. Setup Naming 
          # Branch name uses hyphens: 2.2.3 -> 2-2-3
          BRANCH_NAME="${{ env.AGENT_NAME }}_release_notes_$(echo ${VERSION} | tr '.' '-')"
          COMMIT_MSG="chore(${{ env.AGENT_NAME }} agent): add release notes v${VERSION}"
          PR_TITLE="${{ env.AGENT_TITLE }} Release Notes v${VERSION}"
          PR_BODY="This is an automated PR generated when the ${{ env.AGENT_TITLE }} is released. Please merge as soon as possible."

          # 3. Git Operations
          git config user.name "newrelic-mobile-agent-bot"
          git config user.email "${{ env.BOT_EMAIL }}"
          
          git checkout -b "$BRANCH_NAME"
          
          # Copy generic 'release-notes.mdx' from the agent-repo to the docs folder with the new name
          cp ../agent-repo/release-notes.mdx "${{ env.DOCS_PATH }}/$FINAL_FILENAME"
          
          git add .
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH_NAME"

          # 4. Create PR
          gh pr create \
            --repo newrelic/docs-website \
            --base develop \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --label "documentation" 
